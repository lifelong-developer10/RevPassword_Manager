<app-navbar></app-navbar>
<div class="container mt-4">

  <!-- ROW 1 — 4 CARDS -->
  <div class="row g-4">

    <!-- ================= PROFILE CARD ================= -->
    <div class="col-md-3">
      <div class="card shadow-sm p-3 h-100">

        <h5 class="mb-3">Profile Info</h5>

        <label>Username</label>
        <input class="form-control mb-2"
               [(ngModel)]="user.username">

        <label>Email</label>
        <input class="form-control mb-2"
               [(ngModel)]="user.email">

        <label>Phone</label>
        <input class="form-control mb-3"
               [(ngModel)]="user.phone">

        <button class="btn btn-primary w-100"
                (click)="updateProfile()">
          Update Profile
        </button>

      </div>
    </div>


    <!-- ================= SECURITY QUESTIONS CARD ================= -->
    <div class="col-md-3">
      <div class="card shadow-sm p-3 h-100">

        <h5 class="mb-3">Security Questions</h5>

        <div *ngFor="let q of questions">

          <label>{{q.question}}</label>

          <input
            type="text"
            [(ngModel)]="q.answer"
            class="form-control">

        </div>

        <button class="btn btn-primary w-100 mt-2"
                (click)="updateQuestions()">
          Update Questions
        </button>

      </div>
    </div>


    <!-- ================= CHANGE PASSWORD CARD ================= -->
    <div class="col-md-3">
      <div class="card shadow-sm p-3 h-100">

        <h5 class="mb-3">Change Master Password</h5>

        <label>Current Password</label>
        <input type="password"
               class="form-control mb-2"
               [(ngModel)]="password.current">

        <label>New Password</label>
        <input type="password"
               class="form-control mb-2"
               [(ngModel)]="password.new">

        <label>Confirm Password</label>
        <input type="password"
               class="form-control mb-3"
               [(ngModel)]="password.confirm">

        <button class="btn btn-primary w-100"
                (click)="changePassword()">
          Update Password
        </button>

      </div>
    </div>


    <!-- ================= 2FA CARD ================= -->
    <div class="col-md-3">
      <div class="card shadow-sm p-3 h-100 text-center">

        <h5 class="mb-3">Two Factor Authentication</h5>

        <p>
          Status:
          <span class="fw-bold"
                [class.text-success]="user.twoFactorEnabled"
                [class.text-danger]="!user.twoFactorEnabled">

            {{ user.twoFactorEnabled ? 'Enabled' : 'Disabled' }}

          </span>
        </p>

        <button class="btn btn-outline-primary w-100"
                (click)="toggle2FA()">

          {{ user.twoFactorEnabled ? 'Disable 2FA' : 'Enable 2FA' }}

        </button>

      </div>
    </div>

  </div>


  <!-- ================= SUCCESS MESSAGE ================= -->
  <div class="mt-3 text-center text-success fw-bold"
       *ngIf="message">

    {{message}}

  </div>

</div>
