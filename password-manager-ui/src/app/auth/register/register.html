<nav class="navbar navbar-expand-lg navbar-dark bg-primary px-4">

  <span class="navbar-brand fw-bold">
    🔐 Password Manager
  </span>

  <div class="ms-auto">

    <button class="btn btn-light btn-sm"
            routerLink="/dashboard">
      Dashboard
    </button>

    <button class="btn btn-light btn-sm ms-2"
            routerLink="/vault">
      Vault
    </button>

    <button class="btn btn-light btn-sm ms-2"
            routerLink="/profile">
      Profile
    </button>

    <button class="btn btn-danger btn-sm ms-2"
            (click)="logout()">
      Logout
    </button>

  </div>

</nav>
<br>
<div class="card p-4 shadow col-md-6 mx-auto mt-2">
<div class="auth-container">

  <div class="auth-card">

    <h3 class="text-center mb-3">Create Account</h3>

    <form [formGroup]="form" (ngSubmit)="register()">

      <!-- Username -->
      <input
        class="form-control mb-3"
        placeholder="Username"
        formControlName="username">

      <!-- Email -->
      <input
        class="form-control mb-3"
        placeholder="Email (@gmail.com)"
        formControlName="email">

      <!-- Phone -->
      <input
        class="form-control mb-3"
        placeholder="Phone (10 digits)"
        formControlName="phone">

      <!-- Password -->
      <div class="input-group mb-2">

        <input
          class="form-control"
          [type]="showPassword ? 'text':'password'"
          formControlName="password"
          (input)="checkStrength()">

        <button
          type="button"
          class="btn btn-outline-secondary"
          (click)="togglePassword()">

          <i class="fa"
             [ngClass]="showPassword ? 'fa-eye-slash':'fa-eye'"></i>

        </button>

      </div>

      <!-- Generate -->
      <button
        type="button"
        class="btn btn-sm btn-secondary mb-3"
        (click)="generatePassword()">
        Generate Strong Password
      </button>

      <!-- Strength -->
      <div class="progress mb-3" style="height:6px">
        <div class="progress-bar"
             [style.width.%]="strengthScore"
             [style.background]="strengthColor">
        </div>
      </div>

      <small>{{strengthLabel}} ({{strengthScore}}%)</small>

      <!-- Security Questions -->
      <h5 class="mt-4">Security Questions</h5>

      <div *ngFor="let q of questions">

        <label class="fw-semibold">{{q.question}}</label>

        <input
          class="form-control mb-2"
          [(ngModel)]="q.answer"
          [ngModelOptions]="{standalone:true}"
          placeholder="Your Answer"
          required>

      </div>

      <button class="btn btn-primary w-100 mt-3">
        Register
      </button>

    </form>

  </div>

</div>
</div>
